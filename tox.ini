[tox]
minversion = 4
envlist =
  black
  flake8
  mypy
  py3

[testenv]
usedevelop = true
extras =
  testing
deps =
  pytest-cov
  pytest-xdist
  dev: ipdb
commands =
  pytest --doctest-modules \
  !slow: --hypothesis-profile=fast \
  slow:  --hypothesis-profile=slow \
         --rootdir {envsitepackagesdir} \
         --cov=swh/scheduler \
         --cov-branch \
         swh/scheduler \
         {posargs}

[testenv:py3{,11,12,13,14,15}]
extras =
  testing
  testing-journal

[testenv:pypy3{,11}]
extras =
  testing
commands =
  pytest --doctest-modules \
  !slow: --hypothesis-profile=fast \
  slow:  --hypothesis-profile=slow \
         --rootdir {envsitepackagesdir} \
         --cov=swh/scheduler \
         --cov-branch \
         -m 'not requires_journal' \
         swh/scheduler \
         {posargs}

[testenv:black]
skip_install = true
deps =
  black==26.5.1
commands =
  {envpython} -m black --check swh

[testenv:flake8]
skip_install = true
deps =
  flake8==7.3.0
  flake8-bugbear==25.11.29
  flake8-pyproject==1.2.4
  pycodestyle==2.14.0

commands =
  {envpython} -m flake8

[testenv:mypy]
extras =
  testing
  testing-journal
deps =
  mypy==2.1.0
commands =
  mypy -n8 swh

# build documentation outside swh-environment using the current
# git HEAD of swh-docs, is executed on CI for each diff to prevent
# breaking doc build
[testenv:sphinx]
allowlist_externals = make
extras =
  testing
  testing-journal
deps =
  # fetch and install swh-docs
  git+https://gitlab.softwareheritage.org/swh/devel/swh-docs.git\#egg=swh.docs
setenv =
  SWH_PACKAGE_DOC_TOX_BUILD = 1
  # turn warnings into errors
  SPHINXOPTS = -W
commands =
  make -I {env_dir}/share/swh-docs -C docs
